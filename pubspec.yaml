name: flutter_base_kit_workspace
description: Monorepo workspace root — not a publishable package.
publish_to: none

environment:
  sdk: ^3.9.0

workspace:
  - apps/mobile
  - packages/flutter_kit_network
  - packages/flutter_kit_core
  - packages/flutter_kit_auth
  - packages/flutter_kit_firebase
  - packages/flutter_kit_ui


dev_dependencies:
  melos: ^7.8.0

melos:
  command:
    bootstrap: {}

  scripts:
    analyze:
      run: dart analyze .
      description: Analyze all packages
      exec:
        concurrency: 4

    test:
      run: flutter test
      description: Run tests in all packages
      exec:
        concurrency: 2

    format:
      run: dart format lib test
      description: Format all packages
      exec:
        concurrency: 4

    format:check:
      run: dart format --output=none --set-exit-if-changed lib test
      description: Check formatting without modifying files
      exec:
        concurrency: 4

    gen:feature:
      run: dart scripts/gen_feature.dart
      description: Yeni feature scaffold oluştur (interaktif)
