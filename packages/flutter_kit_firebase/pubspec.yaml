    sdk: flutter

  firebase_core: ^4.5.0
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
