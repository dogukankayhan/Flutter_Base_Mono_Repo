name: Android Production

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-distribute:
    name: Build & Upload to Firebase (Prod)
    runs-on: self-hosted

    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap monorepo
        working-directory: .
        run: |
          dart pub global activate melos
          melos bootstrap

      - name: Build APK (Prod - Debug)
        run: flutter build apk --flavor prod -t lib/main_prod.dart --debug

